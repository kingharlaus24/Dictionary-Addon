<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dictionary Lookup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="popup-container">
    <div id="tabs" role="tablist" aria-label="Dictionary views">
      <button id="tab-lookup" class="active" type="button">Lookup</button>
      <button id="tab-history" type="button">History</button>
      <button id="tab-favorites" type="button">Saved</button>
    </div>
    <div id="content-lookup" class="tab-content">
      <div id="lookup-box">
        <input type="text" id="popupInput" placeholder="Enter a word" autocomplete="off">
        <button id="popupLookupBtn" type="button">Look Up</button>
      </div>
      <div id="popupDefinition" class="definition-area"></div>
    </div>
    <div id="content-history" class="tab-content hidden">
      <ul id="popupHistoryList" class="history-list"></ul>
      <button id="popupClearHistory" class="secondary-button" type="button">Clear History</button>
    </div>
    <div id="content-favorites" class="tab-content hidden">
      <ul id="popupFavoritesList" class="history-list"></ul>
      <button id="popupClearFavorites" class="secondary-button" type="button">Clear Saved</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
